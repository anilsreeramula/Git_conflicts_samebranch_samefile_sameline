<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Exam Registration</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            color: gray;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Exam Registration Form</h2>

        <form>

            <label for="name">Student Name</label>
            <input type="text" id="name" name="name" placeholder="Enter student name" required>

            <label for="roll">Roll Number</label>
            <input type="text" id="roll" name="roll" placeholder="Enter roll number" required>

            <label for="class">Class</label>
            <select id="class" name="class">
                <option>Class 8</option>
                <option>Class 9</option>
                <option>Class 10</option>
                <option>Class 11</option>
                <option>Class 12</option>
            </select>

            <label for="school">School Name</label>
            <input type="text" id="school" name="school" placeholder="Enter school name">

            <label for="exam">Examination Name</label>
            <input type="text" id="exam" name="exam" placeholder="Example: Final Exam 2026">

            <label for="details">Additional Details</label>
            <textarea id="details" rows="4" placeholder="Enter additional details"></textarea>

            <button type="submit">Submit Registration</button>

        </form>

        <div class="footer">
            Student Examination Portal
        </div>
    </div>

</body>
</html>
